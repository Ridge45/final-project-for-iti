{% extends 'base.html' %}
{% block content %}
<div class="hero-section">
  <div class="container">
    <h1 class="display-4 fw-bold mb-3">
      <i class="fas fa-credit-card me-3"></i>Checkout
    </h1>
    <p class="lead">Complete your order</p>
  </div>
</div>

<div class="row">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">
          <i class="fas fa-user me-2"></i>Customer Information
        </h5>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="customer_name" class="form-label">
                <i class="fas fa-user me-2"></i>Full Name
              </label>
              <input type="text" class="form-control" id="customer_name" name="customer_name" 
                     value="{{ cart.customer_name }}" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="phone" class="form-label">
                <i class="fas fa-phone me-2"></i>Phone Number
              </label>
              <input type="tel" pattern="\d*" inputmode="numeric" class="form-control" id="phone" name="phone" 
                     value="{{ cart.phone }}" required>
            </div>
          </div>
          
          <div class="mb-4">
            <label class="form-label">
              <i class="fas fa-credit-card me-2"></i>Payment Method
            </label>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="payment_method" 
                     id="cash" value="cash" checked>
              <label class="form-check-label" for="cash">
                <i class="fas fa-money-bill-wave me-2"></i>Cash on Delivery
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="payment_method" 
                     id="card" value="card">
              <label class="form-check-label" for="card">
                <i class="fas fa-credit-card me-2"></i>Card Payment
              </label>
            </div>
          </div>
          
          <div class="d-grid gap-2 d-md-flex justify-content-md-end">
            <a href="{% url 'orders:cart' %}" class="btn btn-secondary btn-lg">
              <i class="fas fa-arrow-left me-2"></i>Back to Cart
            </a>
            <button type="submit" class="btn btn-success btn-lg">
              <i class="fas fa-check me-2"></i>Place Order
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
  
  <div class="col-lg-4">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">
          <i class="fas fa-receipt me-2"></i>Order Summary
        </h5>
      </div>
      <div class="card-body">
        {% for item in items %}
        <div class="d-flex justify-content-between mb-2">
          <span>{{ item.quantity }}x {{ item.item.name }}</span>
          <span>${{ item.total_price }}</span>
        </div>
        {% endfor %}
        <hr>
        <div class="d-flex justify-content-between mb-3">
          <strong>Total:</strong>
          <strong class="text-success">${{ total }}</strong>
        </div>
        
        
      </div>
    </div>
  </div>
</div>

<style>
  .form-control {
    border-radius: 10px;
    border: 2px solid #e9ecef;
    padding: 12px 15px;
    transition: all 0.3s ease;
  }
  .form-control:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
  }
  .form-label {
    font-weight: 600;
    color: #495057;
  }
</style>
{% endblock %}
